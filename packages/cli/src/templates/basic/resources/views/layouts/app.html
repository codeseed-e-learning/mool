<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><%= title %></title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: #12151c;
      --panel-border: #22262f;
      --text: #e8eaed;
      --muted: #8b93a1;
      --accent: #7c5cff;
      --accent-2: #4dd0e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 20% -10%, #1a1030 0%, var(--bg) 45%),
                  radial-gradient(circle at 100% 0%, #061a22 0%, var(--bg) 40%),
                  var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 72px 24px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(124, 92, 255, 0.08);
      color: var(--accent-2);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      font-size: 18px;
      color: var(--muted);
      margin: 0 auto;
      max-width: 480px;
    }

    .hello {
      margin-top: 20px;
      font-size: 15px;
      color: var(--muted);
    }

    .hello strong {
      color: var(--text);
    }

    h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 20px;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card .icon {
      font-size: 22px;
      margin-bottom: 10px;
      display: block;
    }

    .card .title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .card .description {
      font-size: 13.5px;
      color: var(--muted);
    }

    .try-it {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 40px;
    }

    .routes {
      display: grid;
      gap: 10px;
    }

    .route {
      display: flex;
      align-items: baseline;
      gap: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13.5px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
    }

    .method {
      flex-shrink: 0;
      width: 42px;
      font-weight: 700;
      color: var(--accent-2);
    }

    .path {
      color: var(--text);
    }

    .desc {
      color: var(--muted);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      margin-left: auto;
      text-align: right;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding-top: 24px;
      border-top: 1px solid var(--panel-border);
    }

    footer a {
      color: var(--accent-2);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    @media (max-width: 480px) {
      .logo { font-size: 42px; }
      .wrap { padding: 48px 16px 32px; }
      .route { flex-wrap: wrap; }
      .desc { margin-left: 0; text-align: left; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <%- children %>
  </div>
</body>
</html>
